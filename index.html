<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ESL News 주간 리포트</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
    <style>
        :root {
            --blue: #2F006DCC;
            --blue-dark: #1e0047;
            --blue-light: #f0e6ff;
            --text-primary: #191f28;
            --text-secondary: #4e5968;
            --text-tertiary: #8b95a1;
            --bg-base: #f9fafb;
            --bg-white: #ffffff;
            --border: #e5e8eb;
            --border-light: #f2f4f6;
            --red: #f04452;
            --green: #1aba7b;
            --orange: #f59e0b;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 100px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── HEADER ── */
        .header {
            background: #000;
            color: #fff;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-brand .brand-icon {
            width: 40px; height: 40px;
            background: none;
            border-radius: 0;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .header-brand .brand-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #fff;
        }
        .header-brand .brand-sub {
            font-size: 0.72rem;
            color: rgba(255,255,255,0.45);
            margin-left: 2px;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .badge {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-full);
            padding: 5px 14px;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.2px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.75);
            border-radius: var(--radius-full);
            padding: 6px 16px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }

        /* ── WEEK SELECTOR ── */
        .week-selector-bar {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            position: sticky;
            top: 64px;
            z-index: 100;
        }
        .week-selector-inner {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        .week-selector-label {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            font-weight: 600;
            white-space: nowrap;
        }
        .week-nav-btn {
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            width: 34px; height: 34px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .week-nav-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
        .week-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .week-select {
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 12px;
            font-size: 0.875rem;
            color: var(--text-primary);
            background: var(--bg-white);
            cursor: pointer;
            outline: none;
            font-family: inherit;
            font-weight: 500;
            transition: border-color 0.15s;
        }
        .week-select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(47,0,109,0.12); }
        #yearSelect { min-width: 86px; }
        #monthSelect { min-width: 76px; }
        #weekSelect { min-width: 200px; }
        .report-count { font-size: 0.78rem; color: var(--text-tertiary); margin-left: auto; }

        /* ── MAIN CONTENT ── */
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 40px; }

        /* ── STATS ROW ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            padding: 18px 16px;
            text-align: center;
            border: 1.5px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        .stat-card:hover {
            border-color: var(--blue);
            box-shadow: 0 4px 16px rgba(47,0,109,0.12);
            transform: translateY(-2px);
        }
        .stat-card.active {
            border-color: var(--blue);
            background: var(--blue-light);
        }
        .stat-icon { font-size: 1.3rem; margin-bottom: 6px; line-height: 0; display: flex; align-items: center; justify-content: center; }
        .stat-icon svg { width: 32px; height: 32px; display: block; }
        .stat-count { font-size: 1.6rem; font-weight: 800; color: var(--blue); letter-spacing: -0.5px; }
        .stat-label { font-size: 0.7rem; color: var(--text-tertiary); margin-top: 3px; line-height: 1.3; font-weight: 500; }

        /* ── SECTION TABS ── */
        .section-tabs {
            display: flex;
            gap: 0;
            background: var(--bg-white);
            border-radius: var(--radius-xl);
            padding: 5px;
            border: 1.5px solid var(--border);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            background: transparent;
            border-radius: var(--radius-lg);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-tertiary);
            transition: all 0.2s;
            white-space: nowrap;
            font-family: inherit;
            min-width: 80px;
            letter-spacing: -0.1px;
        }
        .tab-btn:hover { background: var(--bg-base); color: var(--text-secondary); }
        .tab-btn.active { background: var(--blue); color: #fff; box-shadow: 0 2px 10px rgba(47,0,109,0.28); }
        .tab-badge {
            display: inline-block;
            background: rgba(0,0,0,0.08);
            border-radius: var(--radius-full);
            padding: 1px 7px;
            font-size: 0.68rem;
            margin-left: 4px;
            font-weight: 700;
        }
        .tab-btn.active .tab-badge { background: rgba(255,255,255,0.22); }

        /* ── SECTION CONTENT ── */
        .section-content { display: none; }
        .section-content.active { display: block; }

        /* ── SEGMENT GROUP ── */
        .segment-group { margin-bottom: 32px; }
        .segment-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .segment-badge {
            background: var(--blue);
            color: white;
            border-radius: var(--radius-full);
            padding: 5px 16px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2px;
        }
        .segment-line { flex: 1; height: 1px; background: var(--border); }

        /* ── ARTICLE GRID ── */
        .articles-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        @media (max-width: 840px) { .articles-grid { grid-template-columns: 1fr; } }

        /* ── ARTICLE CARD ── */
        .article-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            border: 1.5px solid var(--border);
            padding: 0;
            transition: all 0.22s;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.3s ease both;
        }
        .article-card:hover {
            border-color: var(--blue);
            box-shadow: 0 8px 32px rgba(47,0,109,0.1);
            transform: translateY(-3px);
        }
        .article-card-body { padding: 22px 24px; }
        .article-thumb {
            width: 100%;
            height: 192px;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-base);
        }
        .article-thumb-error { display: none; }
        @media (max-width: 600px) { .article-thumb { height: 160px; } }

        .article-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
        .meta-tag {
            font-size: 0.68rem;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            font-weight: 700;
            letter-spacing: 0.1px;
        }
        .meta-source { background: var(--blue-light); color: var(--blue); }
        .meta-date { background: #e8f8f1; color: #0d7a4e; }

        .article-title {
            font-size: 0.975rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 14px;
            line-height: 1.45;
            letter-spacing: -0.2px;
        }
        .article-section { margin-bottom: 12px; }
        .article-section-label {
            font-size: 0.68rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 5px;
        }
        .label-summary { color: var(--blue); }
        .label-implications { color: #e07b39; }
        .article-section-text {
            font-size: 0.855rem;
            line-height: 1.7;
            color: var(--text-secondary);
        }
        .article-section-text .md-p { margin: 0 0 6px 0; }
        .article-section-text .md-p:last-child { margin-bottom: 0; }
        .article-section-text .md-list { margin: 4px 0 6px 0; padding-left: 18px; }
        .article-section-text .md-list li { margin-bottom: 4px; line-height: 1.58; }
        .article-section-text strong { color: var(--text-primary); font-weight: 700; }

        /* ── IMPLICATION TAGS ── */
        .impl-tag {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 800;
            padding: 2px 9px;
            border-radius: var(--radius-sm);
            margin-right: 6px;
            vertical-align: middle;
            letter-spacing: 0.2px;
        }
        .impl-tag-threat  { background: #fff1f2; color: #c8222e; border: 1px solid #fca5a9; }
        .impl-tag-oppo    { background: #ecfdf5; color: #0d7a4e; border: 1px solid #6ee7b7; }
        .impl-tag-trend   { background: var(--blue-light); color: var(--blue-dark); border: 1px solid #c4a3e8; }
        .impl-tag-action  { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }

        /* ── ARTICLE FOOTER ── */
        .article-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border-light);
            flex-wrap: wrap;
            gap: 8px;
        }
        .source-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--blue);
            text-decoration: none;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 6px 16px;
            border: 1.5px solid rgba(47,0,109,0.25);
            border-radius: var(--radius-full);
            transition: all 0.15s;
            background: var(--blue-light);
        }
        .source-link:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
        .source-link svg { width: 12px; height: 12px; }

        /* ── EMPTY / NO-REPORT ── */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-tertiary);
        }
        .empty-state .empty-icon { font-size: 2.8rem; margin-bottom: 14px; }
        .empty-state h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 700; }
        .empty-state p { font-size: 0.83rem; line-height: 1.65; }
        .no-report {
            background: var(--bg-white);
            border-radius: var(--radius-xl);
            border: 1.5px dashed var(--border);
            text-align: center;
            padding: 80px 24px;
        }
        .no-report .icon { font-size: 3rem; margin-bottom: 18px; }
        .no-report h2 { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 10px; font-weight: 700; }
        .no-report p { font-size: 0.85rem; color: var(--text-tertiary); line-height: 1.7; }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            padding: 28px 24px;
            color: var(--text-tertiary);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 48px;
            background: var(--bg-white);
            letter-spacing: 0.2px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .header { padding: 0 20px; }
            .week-selector-bar { padding: 0 20px; height: auto; padding-top: 12px; padding-bottom: 12px; }
            .container { padding: 20px 20px; }
            .stats-row { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 480px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }

        /* ── PRINT ── */
        @media print {
            .week-selector-bar { position: static; }
            .article-card { break-inside: avoid; }
        }

        /* ── LOGIN OVERLAY ── */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        #loginOverlay.hidden { display: none; }
        .login-box {
            background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-xl);
            padding: 48px 44px;
            width: 100%;
            max-width: 400px;
        }
        .login-logo { text-align: center; margin-bottom: 36px; }
        .login-logo .brand-icon-lg {
            width: 88px; height: 88px;
            background: none;
            border-radius: 0;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .login-logo .login-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .login-logo .login-subtitle {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }
        .login-field { margin-bottom: 14px; }
        .login-field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            margin-bottom: 7px;
            letter-spacing: 0.3px;
        }
        .login-field input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            color: #fff;
            background: rgba(255,255,255,0.06);
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }
        .login-field input::placeholder { color: rgba(255,255,255,0.25); }
        .login-field input:focus {
            border-color: var(--blue);
            background: rgba(47,0,109,0.08);
        }
        .login-field input.error { border-color: var(--red); }
        .login-error {
            font-size: 0.75rem;
            color: #ff6b75;
            margin-top: 6px;
            min-height: 18px;
            font-weight: 600;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--blue);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.93rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            font-family: inherit;
            transition: background 0.15s, transform 0.1s;
            letter-spacing: -0.1px;
        }
        .login-btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }
        .login-hint {
            text-align: center;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.25);
            margin-top: 20px;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes iconFloat {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50% { transform: translateY(-9px) rotate(1deg); }
        }
        .icon-float { animation: iconFloat 3.4s ease-in-out infinite; display: block; }

        /* ── VIEW COUNT ── */
        .view-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #fffbeb;
            color: #92400e;
            border: 1px solid #fcd34d;
            border-radius: var(--radius-full);
            padding: 4px 12px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .view-summary-bar {
            background: var(--bg-white);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .view-summary-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .view-summary-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .view-summary-item {
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 5px 12px;
            font-size: 0.72rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        .view-summary-item:hover { background: var(--blue-light); border-color: var(--blue); }
        .view-summary-item .v-label { color: var(--text-tertiary); }
        .view-summary-item .v-count { font-weight: 800; color: var(--blue); margin-left: 4px; }

        /* ── SECTION TITLE (for articles grid) ── */
        .section-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .section-title-text {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        .section-title-line { flex: 1; height: 1px; background: var(--border); }

        /* ── LIKE BUTTON ── */
        .reaction-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-light);
        }
        .like-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 13px 5px 10px;
            border-radius: var(--radius-full);
            border: 1.5px solid var(--border);
            background: transparent;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-tertiary);
            transition: all 0.18s;
            font-family: inherit;
            line-height: 1;
        }
        .like-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
        .like-btn.liked { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
        .like-btn svg { width: 15px; height: 15px; transition: transform 0.15s; flex-shrink: 0; }
        .like-btn.liked svg { transform: scale(1.15); }
        .like-btn:active svg { transform: scale(0.9); }
        .like-count { min-width: 8px; }

        /* ── TOAST ── */
        .toast-wrap {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8000;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .toast {
            background: rgba(25, 25, 25, 0.95);
            color: #fff;
            padding: 11px 22px;
            border-radius: var(--radius-full);
            font-size: 0.84rem;
            font-weight: 600;
            letter-spacing: -0.1px;
            opacity: 0;
            transform: translateY(10px) scale(0.96);
            transition: opacity 0.22s, transform 0.22s;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show { opacity: 1; transform: translateY(0) scale(1); }
    </style>
</head>

// =====================================================================
// =====================================================================
// REACTION (LIKE) SYSTEM
// =====================================================================
// 모든 사용자가 공유하는 좋아요 카운트를 위해 Firebase Realtime Database를 사용합니다.
// 설정 방법:
//   1. https://console.firebase.google.com 에서 프로젝트 생성
//   2. Realtime Database → 만들기 (테스트 모드 선택)
//   3. 아래 FIREBASE_DB_URL 에 데이터베이스 URL 입력
//      (예: https://my-project-default-rtdb.firebaseio.com)
// 미설정 시 개인 브라우저 기준으로만 카운트가 저장됩니다.

const FIREBASE_DB_URL = 'https://esl-weekly-report-default-rtdb.asia-southeast1.firebasedatabase.app';

// 기사 고유 ID 생성 (URL + 제목 해시)
function getArticleId(article) {
    const raw = (article.sourceUrl || '') + (article.title || '') + (article.pubDate || '');
    let h = 0;
    for (let i = 0; i < raw.length; i++) {
        h = Math.imul(31, h) + raw.charCodeAt(i) | 0;
    }
    return 'a' + Math.abs(h).toString(36);
}

// 로컬 like 상태 (이 브라우저 사용자가 좋아요 눌렀는지)
function isLikedLocally(articleId) {
    try {
        const likes = JSON.parse(localStorage.getItem('esl_likes') || '{}');
        return !!likes[articleId];
    } catch { return false; }
}
function setLikedLocally(articleId, val) {
    try {
        const likes = JSON.parse(localStorage.getItem('esl_likes') || '{}');
        if (val) likes[articleId] = 1; else delete likes[articleId];
        localStorage.setItem('esl_likes', JSON.stringify(likes));
    } catch {}
}

// Firebase REST API로 카운트 읽기/쓰기
async function fetchReactionCount(articleId) {
    if (!FIREBASE_DB_URL) {
        try { return parseInt(localStorage.getItem('esl_count_' + articleId) || '0', 10); } catch { return 0; }
    }
    try {
        const res = await fetch(`${FIREBASE_DB_URL}/likes/${articleId}.json`);
        const data = await res.json();
        return typeof data === 'number' ? data : 0;
    } catch { return 0; }
}
async function saveReactionCount(articleId, count) {
    if (!FIREBASE_DB_URL) {
        try { localStorage.setItem('esl_count_' + articleId, String(count)); } catch {} return;
    }
    try {
        await fetch(`${FIREBASE_DB_URL}/likes/${articleId}.json`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(Math.max(0, count))
        });
    } catch {}
}

// 렌더링 후 카드의 카운트를 비동기로 채워넣기
async function loadReactionCounts() {
    const btns = document.querySelectorAll('.like-btn[data-article-id]');
    for (const btn of btns) {
        const id = btn.dataset.articleId;
        const count = await fetchReactionCount(id);
        const countEl = btn.querySelector('.like-count');
        if (countEl) countEl.textContent = count > 0 ? count : '';
        if (isLikedLocally(id)) btn.classList.add('liked');
    }
}

// 좋아요 토글 핸들러
async function toggleLike(btn, articleId) {
    const wasLiked = isLikedLocally(articleId);
    const currentCount = parseInt(btn.querySelector('.like-count').textContent || '0', 10);
    const newLiked = !wasLiked;
    const newCount = newLiked ? currentCount + 1 : Math.max(0, currentCount - 1);

    // 즉시 UI 반영 (낙관적 업데이트)
    btn.classList.toggle('liked', newLiked);
    btn.querySelector('.like-count').textContent = newCount > 0 ? newCount : '';
    setLikedLocally(articleId, newLiked);

    // Firebase 저장 (비동기)
    await saveReactionCount(articleId, newCount);

    // 토스트 메시지
    showToast(newLiked
        ? '정말 도움이 되는 중요한 정보에요'
        : '정말 중요하고 도움이 된다고는 생각하지 않아요');
}

// 토스트 표시 (3초)
let _toastTimer = null;
function showToast(message) {
    const wrap = document.getElementById('toastWrap');
    if (!wrap) return;
    // 기존 토스트 즉시 제거
    if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
    wrap.innerHTML = '';

    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = message;
    wrap.appendChild(el);

    // 다음 프레임에 show 클래스 추가 (트랜지션 발동)
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));

    _toastTimer = setTimeout(() => {
        el.classList.remove('show');
        setTimeout(() => { wrap.innerHTML = ''; }, 250);
    }, 3000);
}

let currentWeekId = null;
let currentSection = 'industryTrends';

const MONTH_NAMES = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

// Initialize
window.addEventListener('DOMContentLoaded', () => {
    populateYearSelect();
    if (WEEKLY_REPORTS.length > 0) {
        const latestWeekId = WEEKLY_REPORTS[WEEKLY_REPORTS.length - 1].weekId;
        loadWeek(latestWeekId);
    }
    updateNavButtons();
});

function populateYearSelect() {
    const yearSelect = document.getElementById('yearSelect');
    const count = document.getElementById('reportCount');
    count.textContent = `총 ${WEEKLY_REPORTS.length}개 리포트`;

    const years = [...new Set(WEEKLY_REPORTS.map(r => r.weekId.substring(0, 4)))].sort().reverse();
    years.forEach(year => {
        const opt = document.createElement('option');
        opt.value = year;
        opt.textContent = `${year}년`;
        yearSelect.appendChild(opt);
    });
}

function onYearChange(year) {
    const monthSelect = document.getElementById('monthSelect');
    const weekSelect = document.getElementById('weekSelect');

    monthSelect.innerHTML = '<option value="">월 선택</option>';
    weekSelect.innerHTML = '<option value="">주간 선택</option>';
    weekSelect.disabled = true;

    if (!year) {
        monthSelect.disabled = true;
        return;
    }

    const months = [...new Set(
        WEEKLY_REPORTS.filter(r => r.weekId.startsWith(year)).map(r => parseInt(r.weekId.substring(5, 7)))
    )].sort((a, b) => b - a);

    months.forEach(m => {
        const opt = document.createElement('option');
        opt.value = String(m).padStart(2, '0');
        opt.textContent = MONTH_NAMES[m - 1];
        monthSelect.appendChild(opt);
    });
    monthSelect.disabled = false;
}

function onMonthChange(month) {
    const yearSelect = document.getElementById('yearSelect');
    const weekSelect = document.getElementById('weekSelect');
    const year = yearSelect.value;

    weekSelect.innerHTML = '<option value="">주간 선택</option>';
    if (!month || !year) {
        weekSelect.disabled = true;
        return;
    }

    const prefix = `${year}-${month}`;
    const weeks = WEEKLY_REPORTS
        .filter(r => r.weekId.startsWith(prefix))
        .sort((a, b) => b.weekId.localeCompare(a.weekId));

    weeks.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.weekId;
        opt.textContent = r.weekLabel;
        weekSelect.appendChild(opt);
    });
    weekSelect.disabled = false;
}

function loadWeek(weekId) {
    if (!weekId) {
        currentWeekId = null;
        document.getElementById('mainContent').innerHTML = `
            <div class="no-report">
                <div class="icon">📋</div>
                <h2>주간 ESL 산업 동향 리포트</h2>
                <p>위의 드롭다운에서 조회할 주간을 선택하세요.</p>
            </div>`;
        updateNavButtons();
        return;
    }

    const report = WEEKLY_REPORTS.find(r => r.weekId === weekId);
    if (!report) return;

    currentWeekId = weekId;

    // Sync hierarchical selects
    const year = weekId.substring(0, 4);
    const month = weekId.substring(5, 7);

    const yearSelect = document.getElementById('yearSelect');
    yearSelect.value = year;

    // Rebuild month options for this year
    const monthSelect = document.getElementById('monthSelect');
    monthSelect.innerHTML = '<option value="">월 선택</option>';
    const months = [...new Set(
        WEEKLY_REPORTS.filter(r => r.weekId.startsWith(year)).map(r => parseInt(r.weekId.substring(5, 7)))
    )].sort((a, b) => b - a);
    months.forEach(m => {
        const opt = document.createElement('option');
        opt.value = String(m).padStart(2, '0');
        opt.textContent = MONTH_NAMES[m - 1];
        monthSelect.appendChild(opt);
    });
    monthSelect.value = month;
    monthSelect.disabled = false;

    // Rebuild week options for this year+month
    const weekSelect = document.getElementById('weekSelect');
    weekSelect.innerHTML = '<option value="">주간 선택</option>';
    const prefix = `${year}-${month}`;
    const weeks = WEEKLY_REPORTS
        .filter(r => r.weekId.startsWith(prefix))
        .sort((a, b) => b.weekId.localeCompare(a.weekId));
    weeks.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.weekId;
        opt.textContent = r.weekLabel;
        weekSelect.appendChild(opt);
    });
    weekSelect.value = weekId;
    weekSelect.disabled = false;

    trackView(weekId);
    renderReport(report);
    updateNavButtons();
}

function renderReport(report) {
    const totalArticles = countArticles(report);

    // Count per section
    const sectionCounts = SECTION_CONFIG.map(sec => {
        if (sec.isSegmented) {
            const data = report.sections[sec.key] || {};
            return Object.values(data).reduce((sum, arr) => sum + arr.length, 0);
        }
        return (report.sections[sec.key] || []).length;
    });

    // Stats row
    let statsHTML = `<div class="stats-row">`;
    SECTION_CONFIG.forEach((sec, i) => {
        statsHTML += `
            <div class="stat-card ${currentSection === sec.key ? 'active' : ''}" onclick="switchSection('${sec.key}')">
                <div class="stat-icon">${sec.icon}</div>
                <div class="stat-count">${sectionCounts[i]}</div>
                <div class="stat-label">${sec.label}</div>
            </div>`;
    });
    statsHTML += `</div>`;

    // Section contents
    let sectionsHTML = '';
    SECTION_CONFIG.forEach(sec => {
        const isActive = currentSection === sec.key;
        let content = '';

        if (sec.isSegmented) {
            const data = report.sections[sec.key] || {};
            const segments = Object.keys(data);
            if (segments.length === 0) {
                content = emptyState(sec.label);
            } else {
                segments.forEach(segment => {
                    const articles = data[segment] || [];
                    if (articles.length === 0) return;
                    content += `
                        <div class="segment-group">
                            <div class="segment-header">
                                <span class="segment-badge">${segment}</span>
                                <div class="segment-line"></div>
                                <span style="font-size:0.75rem;color:var(--text-tertiary);font-weight:600;">${articles.length}건</span>
                            </div>
                            <div class="articles-grid">
                                ${articles.map(a => articleCard(a)).join('')}
                            </div>
                        </div>`;
                });
                if (!content) content = emptyState(sec.label);
            }
        } else {
            const articles = report.sections[sec.key] || [];
            if (articles.length === 0) {
                content = emptyState(sec.label);
            } else {
                content = `<div class="articles-grid">${articles.map(a => articleCard(a)).join('')}</div>`;
            }
        }

        sectionsHTML += `
            <div class="section-content ${isActive ? 'active' : ''}" id="section-${sec.key}">
                ${content}
            </div>`;
    });

    // Week header
    const viewCount = getViewCount(report.weekId);
    const weekHeaderHTML = `
        <div style="background:var(--bg-white);border:1.5px solid var(--border);border-radius:var(--radius-xl);padding:24px 28px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
            <div>
                <div style="font-size:0.7rem;color:var(--text-tertiary);font-weight:800;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;">리포트 기간</div>
                <div style="font-size:1.3rem;font-weight:800;color:var(--text-primary);letter-spacing:-0.4px;">${report.weekLabel}</div>
            </div>
            <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                <span class="view-badge">👁 ${viewCount}회 조회</span>
                <div style="text-align:right;">
                    <div style="font-size:0.7rem;color:var(--text-tertiary);font-weight:700;margin-bottom:2px;">총 기사 수</div>
                    <div style="font-size:1.6rem;font-weight:800;color:var(--blue);letter-spacing:-0.5px;">${totalArticles}<span style="font-size:0.85rem;font-weight:600;margin-left:2px;">건</span></div>
                </div>
            </div>
        </div>`;

    const viewSummaryHTML = renderViewSummaryHTML();

    document.getElementById('mainContent').innerHTML = weekHeaderHTML + viewSummaryHTML + statsHTML + sectionsHTML;
    // 렌더링 후 좋아요 카운트 비동기 로드
    loadReactionCounts();
}

function articleCard(article) {
    const sourceDisplay = article.sourceName || extractDomain(article.sourceUrl);
    const thumbHtml = article.imageUrl
        ? `<img class="article-thumb" src="${escapeHtml(article.imageUrl)}" alt="${escapeHtml(article.title)}" loading="lazy" onerror="this.classList.add('article-thumb-error')">`
        : '';
    return `
        <div class="article-card">
            ${thumbHtml}
            <div class="article-card-body">
                <div class="article-meta">
                    <span class="meta-tag meta-source">${escapeHtml(sourceDisplay)}</span>
                    ${article.pubDate ? `<span class="meta-tag meta-date">${escapeHtml(article.pubDate)}</span>` : ''}
                </div>
                <div class="article-title">${escapeHtml(article.title)}</div>
                <div class="article-section">
                    <div class="article-section-label label-summary">요약</div>
                    <div class="article-section-text">${renderMarkdown(article.summary)}</div>
                </div>
                <div class="article-section">
                    <div class="article-section-label label-implications">시사점</div>
                    <div class="article-section-text">${renderImplications(article.implications)}</div>
                </div>
                <div class="article-footer">
                    <a href="${escapeHtml(article.sourceUrl)}" target="_blank" rel="noopener" class="source-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
                        </svg>
                        원문 보기
                    </a>
                    <span style="font-size:0.72rem;color:var(--text-tertiary);font-weight:500;">${escapeHtml(sourceDisplay)}</span>
                </div>
                <div class="reaction-bar">
                    <button class="like-btn" data-article-id="${getArticleId(article)}"
                            onclick="toggleLike(this, '${getArticleId(article)}')" title="도움이 됐어요">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/>
                            <path d="M7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/>
                        </svg>
                        <span class="like-count"></span>
                    </button>
                </div>
            </div>
        </div>`;
}

function emptyState(label) {
    return `
        <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h3>해당 주간 기사 없음</h3>
            <p>${label} 카테고리에서 해당 기간의 관련 기사가 확인되지 않았습니다.</p>
        </div>`;
}

function switchSection(sectionKey) {
    currentSection = sectionKey;
    // Update active states in current rendered report
    document.querySelectorAll('.stat-card').forEach((el, i) => {
        el.classList.toggle('active', SECTION_CONFIG[i].key === sectionKey);
    });
    document.querySelectorAll('.tab-btn').forEach((el, i) => {
        el.classList.toggle('active', SECTION_CONFIG[i].key === sectionKey);
    });
    document.querySelectorAll('.section-content').forEach(el => {
        el.classList.toggle('active', el.id === `section-${sectionKey}`);
    });
}

function navigateWeek(direction) {
    if (!currentWeekId) return;
    const idx = WEEKLY_REPORTS.findIndex(r => r.weekId === currentWeekId);
    const newIdx = idx + direction;
    if (newIdx >= 0 && newIdx < WEEKLY_REPORTS.length) {
        loadWeek(WEEKLY_REPORTS[newIdx].weekId);
    }
}

function updateNavButtons() {
    const idx = WEEKLY_REPORTS.findIndex(r => r.weekId === currentWeekId);
    const prevBtn = document.getElementById('prevWeek');
    const nextBtn = document.getElementById('nextWeek');
    if (prevBtn) prevBtn.disabled = idx <= 0;
    if (nextBtn) nextBtn.disabled = idx < 0 || idx >= WEEKLY_REPORTS.length - 1;
}

function countArticles(report) {
    let total = 0;
    const s = report.sections;
    ['industryTrends', 'majorCompanies', 'solutionProviders', 'technology'].forEach(k => {
        total += (s[k] || []).length;
    });
    const ca = s.customerAdoption || {};
    Object.values(ca).forEach(arr => { total += arr.length; });
    return total;
}

function extractDomain(url) {
    try { return new URL(url).hostname.replace('www.', ''); } catch { return url; }
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// 요약·시사점 마크다운 렌더러
// 지원: **굵게**, - 불릿, 1. 번호목록, \n 줄바꿈
function renderMarkdown(str) {
    if (!str) return '';
    const escaped = escapeHtml(str);
    const lines = escaped.split('\n');
    const result = [];
    let inList = false;
    let listType = '';

    const closeList = () => {
        if (inList) { result.push(listType === 'ul' ? '</ul>' : '</ol>'); inList = false; }
    };
    const applyInline = (s) => s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

    for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) { closeList(); continue; }

        const formatted = applyInline(line);
        const ulMatch = formatted.match(/^[-•]\s+(.+)/);
        const olMatch = formatted.match(/^\d+\.\s+(.+)/);

        if (ulMatch) {
            if (!inList || listType !== 'ul') { closeList(); result.push('<ul class="md-list">'); inList = true; listType = 'ul'; }
            result.push(`<li>${ulMatch[1]}</li>`);
        } else if (olMatch) {
            if (!inList || listType !== 'ol') { closeList(); result.push('<ol class="md-list">'); inList = true; listType = 'ol'; }
            result.push(`<li>${olMatch[1]}</li>`);
        } else {
            closeList();
            result.push(`<p class="md-p">${formatted}</p>`);
        }
    }
    closeList();
    return result.join('');
}

function renderImplications(text) {
    if (!text) return '';
    const tagMap = {
        '[🔴 위협]': { cls: 'impl-tag-threat',  label: '🔴 위협' },
        '[🟢 기회]': { cls: 'impl-tag-oppo',    label: '🟢 기회' },
        '[🔵 트렌드]': { cls: 'impl-tag-trend', label: '🔵 트렌드' },
        '[⚡ 액션]': { cls: 'impl-tag-action',  label: '⚡ 액션' },
    };
    // 태그 치환 후 마크다운 렌더링
    let raw = text;
    for (const [token, { cls, label }] of Object.entries(tagMap)) {
        raw = raw.replace(token, `@@TAG:${cls}:${label}@@`);
    }
    let result = renderMarkdown(raw);
    for (const [, { cls, label }] of Object.entries(tagMap)) {
        result = result.replace(
            `@@TAG:${cls}:${label}@@`,
            `<span class="impl-tag ${cls}">${label}</span>`
        );
    }
    return result;
}

// ── VIEW COUNT ────────────────────────────────────────
const VIEW_PREFIX = 'esl_views_';
const SESS_PREFIX = 'esl_sess_';

function trackView(weekId) {
    const sessKey = SESS_PREFIX + weekId;
    const isNew = !sessionStorage.getItem(sessKey);
    if (isNew) {
        const prev = getViewCount(weekId);
        localStorage.setItem(VIEW_PREFIX + weekId, prev + 1);
        sessionStorage.setItem(sessKey, '1');
    }
    // GTM: 주간 리포트 조회 이벤트 (매번 전송)
    window.dataLayer = window.dataLayer || [];
    const report = WEEKLY_REPORTS.find(r => r.weekId === weekId);
    window.dataLayer.push({
        event: 'esl_report_view',
        week_id: weekId,
        week_label: report ? report.weekLabel : weekId,
        is_new_session_view: isNew
    });
}

function getViewCount(weekId) {
    return parseInt(localStorage.getItem(VIEW_PREFIX + weekId) || '0', 10);
}

function renderViewSummaryHTML() {
    const items = [...WEEKLY_REPORTS].reverse().map(r => {
        const cnt = getViewCount(r.weekId);
        return `<div class="view-summary-item" onclick="loadWeek('${r.weekId}')">
            <span class="v-label">${r.weekLabel.replace(' ~ ', '~')}</span>
            <span class="v-count">👁 ${cnt}회</span>
        </div>`;
    }).join('');
    return `<div class="view-summary-bar">
        <div class="view-summary-title">📊 전체 주차 조회 현황</div>
        <div class="view-summary-list">${items}</div>
    </div>`;
}

// ── LOGIN ──────────────────────────────────────────────
const AUTH_KEY   = 'esl_auth_v1';
const VALID_DOMAIN = '@solum-group.com';
const VALID_PW   = 'thffndpa2026';

(function initAuth() {
    if (sessionStorage.getItem(AUTH_KEY) === 'true') {
        document.getElementById('loginOverlay').classList.add('hidden');
    } else {
        setTimeout(() => document.getElementById('loginEmail').focus(), 100);
    }
})();

function doLogin() {
    const emailEl = document.getElementById('loginEmail');
    const pwEl    = document.getElementById('loginPassword');
    const emailErr = document.getElementById('emailError');
    const pwErr    = document.getElementById('passwordError');

    emailEl.classList.remove('error');
    pwEl.classList.remove('error');
    emailErr.textContent = '';
    pwErr.textContent = '';

    const email = emailEl.value.trim().toLowerCase();
    const pw    = pwEl.value;

    let valid = true;

    if (!email) {
        emailEl.classList.add('error');
        emailErr.textContent = '이메일을 입력하세요.';
        valid = false;
    } else if (!email.endsWith(VALID_DOMAIN) || email.indexOf('@') === 0) {
        emailEl.classList.add('error');
        emailErr.textContent = `@solum-group.com 형식의 이메일만 사용 가능합니다.`;
        valid = false;
    }

    if (!pw) {
        pwEl.classList.add('error');
        pwErr.textContent = '비밀번호를 입력하세요.';
        valid = false;
    } else if (valid && pw !== VALID_PW) {
        pwEl.classList.add('error');
        pwErr.textContent = '비밀번호가 올바르지 않습니다.';
        valid = false;
    }

    if (!valid) return;

    sessionStorage.setItem(AUTH_KEY, 'true');
    // GTM: 로그인 이벤트
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({ event: 'esl_login', user_email: document.getElementById('loginEmail').value.trim().toLowerCase() });
    const overlay = document.getElementById('loginOverlay');
    overlay.style.transition = 'opacity 0.3s';
    overlay.style.opacity = '0';
    setTimeout(() => overlay.classList.add('hidden'), 300);
}

function doLogout() {
    sessionStorage.removeItem(AUTH_KEY);
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('emailError').textContent = '';
    document.getElementById('passwordError').textContent = '';
    const overlay = document.getElementById('loginOverlay');
    overlay.style.opacity = '1';
    overlay.classList.remove('hidden');
    setTimeout(() => document.getElementById('loginEmail').focus(), 100);
}
